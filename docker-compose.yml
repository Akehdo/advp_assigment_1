services:
  doctor-db:
    image: postgres:16
    container_name: doctor-db
    environment:
      POSTGRES_DB: doctor_db
      POSTGRES_USER: doctor_user
      POSTGRES_PASSWORD: doctor_pass
    ports:
      - "5433:5432"
    volumes:
      - doctor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doctor_user -d doctor_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  doctor:
    build:
      context: .
      dockerfile: doctor/Dockerfile
    container_name: doctor-service
    ports:
      - "50051:50051"
    environment:
      DB_HOST: doctor-db
      DB_PORT: 5432
      DB_NAME: doctor_db
      DB_USER: doctor_user
      DB_PASSWORD: doctor_pass
    depends_on:
      doctor-db:
        condition: service_healthy

  appointment-db:
    image: postgres:16
    container_name: appointment-db
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: appointment_user
      POSTGRES_PASSWORD: appointment_pass
    ports:
      - "5434:5432"
    volumes:
      - appointment_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appointment_user -d appointment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  appointment:
    build:
      context: .
      dockerfile: appointment/Dockerfile
    container_name: appointment-service
    ports:
      - "50052:50052"
    environment:
      DB_HOST: appointment-db
      DB_PORT: 5432
      DB_NAME: appointment_db
      DB_USER: appointment_user
      DB_PASSWORD: appointment_pass
      DOCTOR_SERVICE_ADDR: doctor:50051
    depends_on:
      appointment-db:
        condition: service_healthy
      doctor:
        condition: service_started

volumes:
  doctor_pgdata:
  appointment_pgdata:
